services:
  nats:
    image: nats:2.10-alpine
    command: -c /etc/nats/nats-server.conf
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 1s
      timeout: 1s
      retries: 30

  gosidecar:
    build:
      context: ./gosidecar
      dockerfile: Dockerfile.gosidecar
    depends_on:
      nats:
        condition: service_healthy
    environment:
      MICROBUS_NATS: nats://nats:4222
      MICROBUS_PLANE: microbus
      MICROBUS_DEPLOYMENT: TESTING
      MICROBUS_LOCALITY: conformance
    ports:
      - "${GO_SIDECAR_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health.example/health"]
      interval: 2s
      timeout: 2s
      retries: 60
